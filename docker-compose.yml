version: "3.8"

services:
  dev:
    container_name: "${COMPOSE_PROJECT_NAME:-claude-code-devcontainer}-dev"

    build:
      context: .
      dockerfile: .devcontainer/Dockerfile

    working_dir: /workspace

    volumes:
      - .:/workspace:cached
      # Claude config is stored in a named volume (scoped by COMPOSE_PROJECT_NAME).
      # The repo's template lives at /workspace/claude-config and is seeded on first start.
      - claude-home:/home/ubuntu/.claude
      # SSH keys and config — persisted so deploy keys survive container rebuilds
      - ssh-home:/home/ubuntu/.ssh
      # Optional (broad): - /dev:/dev

    # devices:
    #   - source: "${SERIAL_DEVICE:-/dev/ttyACM0}"
    #     target: "/dev/ttyESP"

    # group_add:
    #   - dialout

    privileged: true
    init: true
    tty: true
    stdin_open: true

volumes:
  claude-home:
  ssh-home:
